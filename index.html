<!DOCTYPE html>
<html>
<head>
    <title>Focus Buddy</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

    <div id="homeScreen">

      <h1>FOCUS BUDDY</h1>

      <p>Your Study Companion</p>

     <button id="startBtn">
     Start Session
     </button>

    </div>

     <div id="timer" style="display:none;">

     <h2>Study Session</h2>

     <h1>25:00</h1>

     <p>Come on buddy, let's focus!</p>
     <button id="breakBtn">
      Take Break
     </button>

     </div>
     <div id="breakScreen" style="display:none;">

      <h2>Break Time</h2>

      <h1>05:00</h1>

      <p>Relax Buddy! You earned this break.</p>
       <button id="completeBtn">
        Complete Session
       </button>
     </div>
     <div id="completeScreen" style="display:none;">

     <h2>Session Complete</h2>

     <h1>🏆</h1>

     <p>Awesome Buddy! Another win today!</p>

     <p>Focus Score: 100%</p>

     </div>
    </div>
    <script src="script.js"></script>

</body>
</html>
